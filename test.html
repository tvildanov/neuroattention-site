<style>
:root {
  --test-bg: rgba(5,7,10,0.97);
  --card-bg: rgba(255,255,255,0.12);
  --card-border: rgba(255,255,255,0.22);
  --accent-cyan: #00d2be;
  --accent-rose: #ff6b8a;
  --accent-amber: #f5a623;
  --accent-violet: #a78bfa;
  --accent-green: #34d399;
  --text-primary: #e8eaed;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
}

/* Override cursor:none from redesign.css */
body { cursor: default !important; }
body * { cursor: inherit; }
button, a, .chat-opt-btn { cursor: pointer !important; }

/* ── Chat test layout ── */
.test-chat-page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Chat header with progress ── */
.test-chat-header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(13,17,23,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(78,205,196,0.08);
  padding: 0.75rem 0;
}
.test-chat-header-inner {
  display: flex;
  align-items: center;
  gap: 1rem;
  max-width: 640px;
  margin: 0 auto;
  padding: 0 1.5rem;
}
.test-chat-avatar-header {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, rgba(0,210,190,0.15), rgba(167,139,250,0.12));
  border: 1px solid rgba(0,210,190,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.test-chat-avatar-header svg {
  width: 20px;
  height: 20px;
}
.test-chat-header-info {
  flex: 1;
  min-width: 0;
}
.test-chat-header-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-primary);
  margin: 0;
  line-height: 1.3;
}
.test-chat-header-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  margin: 0;
}

/* ── Progress mini-bar ── */
.chat-progress-wrap {
  max-width: 640px;
  margin: 0.5rem auto 0;
  padding: 0 1.5rem;
}
.chat-progress-bar {
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
}
.chat-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-cyan), var(--accent-violet));
  border-radius: 3px;
  transition: width 0.4s ease;
  width: 0%;
}

/* ── Messages area ── */
.test-chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem 0 2rem;
  margin-top: 0;
}
.test-chat-messages-inner {
  max-width: 640px;
  margin: 0 auto;
  padding: 0 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* ── Chat row ── */
.chat-msg {
  display: flex;
  gap: 0.65rem;
  align-items: flex-start;
  animation: fadeSlideIn 0.35s ease-out both;
}
.chat-msg.user-msg {
  justify-content: flex-end;
}
.chat-msg.bot-msg {
  justify-content: flex-start;
}

/* ── Bot avatar ── */
.chat-msg-avatar {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  background: linear-gradient(135deg, rgba(0,210,190,0.12), rgba(167,139,250,0.10));
  border: 1px solid rgba(0,210,190,0.18);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}
.chat-msg-avatar svg {
  width: 18px;
  height: 18px;
}

/* ── Bubble ── */
.chat-msg-stack {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  max-width: 85%;
}
.chat-msg-bubble {
  font-size: 14px;
  line-height: 1.65;
  color: var(--text-primary);
}
.bot-msg .chat-msg-bubble {
  background: rgba(21,27,36,0.8);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px 16px 16px 4px;
  padding: 0.85rem 1.1rem;
  backdrop-filter: blur(20px);
}
.user-msg .chat-msg-bubble {
  background: linear-gradient(135deg, rgba(78,205,196,0.2), rgba(59,130,246,0.14));
  border: 1px solid rgba(78,205,196,0.25);
  border-radius: 16px 16px 4px 16px;
  padding: 0.85rem 1.1rem;
  backdrop-filter: blur(20px);
  max-width: 80%;
}

/* ── Question icon inside bubble ── */
.q-icon-wrap {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.5rem;
}
.q-icon {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.q-icon svg {
  width: 16px;
  height: 16px;
}
.q-number-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--accent-cyan);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* ── Options inside bot stack ── */
.chat-msg-options {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.chat-opt-btn {
  display: flex;
  align-items: flex-start;
  gap: 0.6rem;
  background: rgba(13,17,23,0.7);
  border: 1px solid rgba(78,205,196,0.18);
  border-radius: 10px;
  padding: 0.7rem 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text-secondary);
  font-size: 0.88rem;
  line-height: 1.5;
  font-family: 'DM Sans', sans-serif;
  text-align: left;
  backdrop-filter: blur(16px);
}
.chat-opt-btn:hover {
  border-color: rgba(78,205,196,0.4);
  color: var(--text-primary);
  background: rgba(0,210,190,0.06);
}
.chat-opt-btn.disabled,
.chat-opt-btn:disabled {
  opacity: 0.4;
  cursor: default;
  pointer-events: none;
}
.chat-opt-letter {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 6px;
  background: rgba(255,255,255,0.1);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--text-muted);
  flex-shrink: 0;
  margin-top: 1px;
  transition: all 0.2s;
}
.chat-opt-btn:hover .chat-opt-letter {
  background: rgba(0,210,190,0.2);
  color: var(--accent-cyan);
}

/* ── Typing indicator ── */
.typing-indicator .chat-msg-bubble {
  padding: 0.85rem 1.2rem;
}

/* ── Result screen ── */
.test-result-wrap {
  display: none;
  max-width: 640px;
  margin: 0 auto;
  padding: 1.5rem 1.5rem 4rem;
  animation: fadeSlideIn 0.5s ease-out;
}
.test-result-wrap.visible { display: block; }
.result-header {
  text-align: center;
  margin-bottom: 2rem;
}
.result-profile-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: rgba(0,210,190,0.1);
  border: 1px solid rgba(0,210,190,0.2);
  border-radius: 24px;
  padding: 0.4rem 1.2rem;
  font-size: 0.8rem;
  color: var(--accent-cyan);
  font-family: 'JetBrains Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 1rem;
}
.result-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(1.4rem,3.5vw,2rem);
  font-weight: 600;
  color: var(--text-primary);
  margin: 0.5rem 0;
}
.result-subtitle {
  color: var(--text-secondary);
  font-size: 1rem;
  line-height: 1.5;
  max-width: 500px;
  margin: 0 auto;
}
.result-section {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  padding: 1.5rem;
  margin-bottom: 1rem;
}
.result-section-icon { font-size: 1.1rem; margin-right: 0.4rem; }
.result-section-title {
  font-weight: 600;
  color: var(--text-primary);
  font-size: 0.95rem;
  margin-bottom: 0.75rem;
}
.result-section p, .result-section li {
  color: var(--text-secondary);
  font-size: 0.9rem;
  line-height: 1.6;
  margin: 0 0 0.5rem;
}
.result-section ul {
  margin: 0;
  padding-left: 1.2rem;
}
.result-section li { margin-bottom: 0.3rem; }
.scores-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 0.75rem;
  margin-bottom: 1rem;
}
.score-item {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 0.75rem;
  text-align: center;
}
.score-item-label {
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.3rem;
}
.score-item-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--accent-cyan);
}
.score-item-max {
  font-size: 0.7rem;
  color: var(--text-muted);
}
.result-unlock {
  background: linear-gradient(135deg, rgba(0,210,190,0.08), rgba(167,139,250,0.08));
  border: 1px solid rgba(0,210,190,0.15);
  border-radius: 14px;
  padding: 1.5rem;
  text-align: center;
  margin-top: 1.5rem;
}
.result-unlock p {
  color: var(--text-secondary);
  font-size: 0.9rem;
  line-height: 1.6;
  margin: 0 0 1rem;
}
.result-cta {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: linear-gradient(135deg, var(--accent-cyan), #00b8a9);
  color: #000;
  font-weight: 600;
  font-size: 1rem;
  padding: 0.85rem 2rem;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s;
}
.result-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,210,190,0.25);
}

/* ── Retake link in result ── */
.result-retake {
  display: inline-block;
  margin-top: 1rem;
  color: var(--text-muted);
  font-size: 0.85rem;
  text-decoration: underline;
  cursor: pointer;
  transition: color 0.2s;
}
.result-retake:hover { color: var(--accent-cyan); }

/* ── Mobile ── */
@media (max-width: 480px) {
  .test-chat-header-inner { padding: 0 1rem; }
  .test-chat-messages-inner { padding: 0 1rem; }
  .chat-msg-stack { max-width: 92%; }
  .chat-opt-btn { font-size: 0.82rem; padding: 0.6rem 0.75rem; }
  .result-section { padding: 1.2rem; }
  .scores-grid { grid-template-columns: repeat(2,1fr); }
  .chat-progress-wrap { padding: 0 1rem; }
}
</style>
</head>

  // ── State ──
  var currentQ = 0;
  var answers = {};
  var container = document.getElementById('chat-messages');
  var scroller = document.getElementById('chat-scroll');

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function(c) {
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function scrollBottom() {
    setTimeout(function(){ scroller.scrollTop = scroller.scrollHeight; }, 60);
  }

  function avatarHTML() {
    return '<div class="chat-msg-avatar">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-cyan)" stroke-width="1.5">' +
      '<path d="M9.5 2a3 3 0 0 0-3 3v.25c0 .3.05.59.13.86A3 3 0 0 0 4 8.75v.5a3 3 0 0 0 1.5 2.59v.5A3 3 0 0 0 4 14.75v.5c0 1.24.75 2.3 1.82 2.74A3 3 0 0 0 9.5 21h1V2z"/>' +
      '<path d="M14.5 2a3 3 0 0 1 3 3v.25c0 .3-.05.59-.13.86A3 3 0 0 1 20 8.75v.5a3 3 0 0 1-1.5 2.59v.5A3 3 0 0 1 20 14.75v.5c0 1.24-.75 2.3-1.82 2.74A3 3 0 0 1 14.5 21h-1V2z"/>' +
      '</svg></div>';
  }

  function updateProgress() {
    var pct = Math.round(currentQ / QUESTIONS.length * 100);
    document.getElementById('chat-step-label').textContent = 'Вопрос ' + (currentQ + 1) + ' / ' + QUESTIONS.length;
    document.getElementById('chat-progress-fill').style.width = pct + '%';
  }

  function addBotMessage(html) {
    var row = document.createElement('div');
    row.className = 'chat-msg bot-msg';
    row.innerHTML = avatarHTML() +
      '<div class="chat-msg-stack"><div class="chat-msg-bubble">' + html + '</div></div>';
    container.appendChild(row);
    scrollBottom();
    return row;
  }

  function addUserMessage(text) {
    var row = document.createElement('div');
    row.className = 'chat-msg user-msg';
    row.innerHTML = '<div class="chat-msg-bubble">' + esc(text) + '</div>';
    container.appendChild(row);
    scrollBottom();
  }

  function showTyping() {
    var row = document.createElement('div');
    row.className = 'chat-msg bot-msg typing-indicator';
    row.id = 'typing-ind';
    row.innerHTML = avatarHTML() +
      '<div class="chat-msg-stack"><div class="chat-msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>';
    container.appendChild(row);
    scrollBottom();
  }

  function removeTyping() {
    var t = document.getElementById('typing-ind');
    if (t) t.parentNode.removeChild(t);
  }

  function renderQuestionChat(qIdx) {
    var q = QUESTIONS[qIdx];
    updateProgress();

    var iconBg = Q_COLORS[qIdx] || 'rgba(0,210,190,0.15)';
    var iconSvg = Q_ICONS[qIdx] || Q_ICONS[0];

    var html = '<div class="q-icon-wrap">' +
      '<div class="q-icon" style="background:' + iconBg + '">' + iconSvg + '</div>' +
      '<span class="q-number-label">Вопрос ' + (qIdx + 1) + '</span>' +
      '</div>' +
      '<div>' + esc(q.text) + '</div>';

    var row = document.createElement('div');
    row.className = 'chat-msg bot-msg';
    row.innerHTML = avatarHTML() +
      '<div class="chat-msg-stack">' +
        '<div class="chat-msg-bubble">' + html + '</div>' +
        '<div class="chat-msg-options" id="opts-' + q.id + '"></div>' +
      '</div>';
    container.appendChild(row);

    var optsWrap = row.querySelector('#opts-' + q.id);
    q.options.forEach(function(opt) {
      var btn = document.createElement('button');
      btn.className = 'chat-opt-btn';
      btn.innerHTML = '<span class="chat-opt-letter">' + opt.letter + '</span><span>' + esc(opt.text) + '</span>';
      btn.addEventListener('click', function() { handleAnswer(q.id, opt.letter, opt.text); });
      optsWrap.appendChild(btn);
    });

    scrollBottom();
  }

  function handleAnswer(qId, letter, text) {
    answers[qId] = letter;
    var optsWrap = document.getElementById('opts-' + qId);
    if (optsWrap) {
      optsWrap.querySelectorAll('.chat-opt-btn').forEach(function(b) {
        b.disabled = true;
        b.classList.add('disabled');
      });
    }
    addUserMessage(text);
    showTyping();
    setTimeout(function() {
      removeTyping();
      currentQ++;
      if (currentQ < QUESTIONS.length) {
        renderQuestionChat(currentQ);
      } else {
        finishTest();
      }
    }, 800);
  }

  function scoreAnswer(letter) {
    return { A:4, B:3, C:2, D:1 }[letter] || 0;
  }

  function computeProfile(ans) {
    var scores = {
      attention: scoreAnswer(ans.Q2) + scoreAnswer(ans.Q4),
      state: scoreAnswer(ans.Q1) + scoreAnswer(ans.Q3) + scoreAnswer(ans.Q5),
      discipline: scoreAnswer(ans.Q6) + scoreAnswer(ans.Q8),
      environment: scoreAnswer(ans.Q7) + scoreAnswer(ans.Q10),
      specialist: scoreAnswer(ans.Q9)
    };
    var total = 0;
    ['Q1','Q2','Q3','Q4','Q5','Q6','Q7','Q8','Q10'].forEach(function(k) {
      total += scoreAnswer(ans[k]);
    });
    var q9Letter = ans.Q9;
    var isSpecialist = (q9Letter === 'C' || q9Letter === 'D');
    var profile;
    if (isSpecialist && total >= 24) profile = 'FUTURE_SPECIALIST';
    else if (total >= 30) profile = 'STABLE_EXPLORER';
    else if ((ans.Q1==='C'||ans.Q1==='D') && (ans.Q3==='C'||ans.Q3==='D') && (ans.Q5==='C'||ans.Q5==='D')) profile = 'NERVOUS_SYSTEM_SENSITIVE';
    else if ((ans.Q2==='C'||ans.Q2==='D') && (ans.Q4==='C'||ans.Q4==='D')) profile = 'DISTRACTED_EXPLORER';
    else profile = 'HIGH_LOAD_ADAPTER';
    return { profile:profile, scores:scores, total:total };
  }

  function finishTest() {
    var result = computeProfile(answers);
    var profile = PROFILES[result.profile];
    var testResult = {
      profile: result.profile, answers: answers,
      scores: result.scores, total: result.total,
      completed_at: new Date().toISOString()
    };
    localStorage.setItem('na_test_result', JSON.stringify(testResult));
    var token = localStorage.getItem('na_token');
    if (token) saveResultToAPI(token, testResult);

    addBotMessage('Отлично! Тест завершён. Ваш профиль адаптации определён. Смотрите результат ниже.');
    document.getElementById('chat-step-label').textContent = 'Завершено';
    document.getElementById('chat-progress-fill').style.width = '100%';

    setTimeout(function() {
      document.getElementById('chat-scroll').style.display = 'none';
      document.getElementById('chat-header').style.display = 'none';
      renderResult(result, profile);
    }, 1200);
  }

  function saveResultToAPI(token, data) {
    fetch(API_BASE + '/api/test-result/save', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer ' + token },
      body: JSON.stringify({ profile:data.profile, answers:data.answers, scores:data.scores })
    }).then(function(r){ return r.json(); })
    .then(function(d){ if (d.ok) localStorage.removeItem('na_test_result'); })
    .catch(function(e){ console.warn('Test result save failed:', e); });
  }

  function renderResult(result, profile) {
    var wrap = document.getElementById('test-result');
    var html = '';
    html += '<div class="result-header">';
    html += '<div class="result-profile-badge" style="border-color:' + profile.color + ';color:' + profile.color + ';">' + profile.emoji + ' Ваш профиль адаптации</div>';
    html += '<h2 class="result-title">' + profile.name + '</h2>';
    html += '<p class="result-subtitle">' + profile.subtitle + '</p>';
    html += '</div>';
    html += '<div class="result-section">';
    html += '<div class="result-section-title"><span class="result-section-icon">📊</span> Разбор по категориям</div>';
    html += '<div class="scores-grid">';
    html += '<div class="score-item"><div class="score-item-label">Внимание</div><div class="score-item-value">' + result.scores.attention + '</div><div class="score-item-max">из 8</div></div>';
    html += '<div class="score-item"><div class="score-item-label">Состояние</div><div class="score-item-value">' + result.scores.state + '</div><div class="score-item-max">из 12</div></div>';
    html += '<div class="score-item"><div class="score-item-label">Дисциплина</div><div class="score-item-value">' + result.scores.discipline + '</div><div class="score-item-max">из 8</div></div>';
    html += '<div class="score-item"><div class="score-item-label">Среда</div><div class="score-item-value">' + result.scores.environment + '</div><div class="score-item-max">из 8</div></div>';
    html += '</div>';
    html += '<p style="text-align:center;margin-top:0.5rem;">Общий балл: <strong style="color:var(--accent-cyan);">' + result.total + '</strong> из 36</p>';
    html += '</div>';
    profile.sections.forEach(function(s) {
      html += '<div class="result-section">';
      html += '<div class="result-section-title"><span class="result-section-icon">' + s.icon + '</span> ' + s.title + '</div>';
      html += s.content;
      html += '</div>';
    });
    html += '<div class="result-unlock">';
    html += '<p>🔓 <strong>Разблокируйте полный профиль</strong> — зарегистрируйтесь, чтобы сохранить результат, получить персональные рекомендации и начать программу адаптации в личном кабинете.</p>';
    html += '<a href="account.html?from_test=1" class="result-cta">👉 Открыть полный профиль</a>';
    html += '</div>';
    html += '<div style="text-align:center;"><span class="result-retake" onclick="location.reload()">Пройти тест заново</span></div>';
    wrap.innerHTML = html;
    wrap.classList.add('visible');
    window.scrollTo({ top:0, behavior:'smooth' });
  }

  // ── Check for existing result ──
  var existing = localStorage.getItem('na_test_result');
  if (existing) {
    try {
      var parsed = JSON.parse(existing);
      if (parsed.profile && PROFILES[parsed.profile]) {
        addBotMessage('Вы уже проходили тест ранее. Хотите <a href="#" onclick="window._showExisting();return false;" style="color:var(--accent-cyan);text-decoration:underline;">посмотреть результат</a> или пройти заново?');
        var choiceRow = document.createElement('div');
        choiceRow.className = 'chat-msg bot-msg';
        choiceRow.innerHTML = avatarHTML() +
          '<div class="chat-msg-stack"><div class="chat-msg-options" id="opts-restart">' +
          '<button class="chat-opt-btn" id="btn-view-result"><span>📊 Посмотреть результат</span></button>' +
          '<button class="chat-opt-btn" id="btn-retake"><span>🔄 Пройти заново</span></button>' +
          '</div></div>';
        container.appendChild(choiceRow);
        document.getElementById('btn-view-result').addEventListener('click', function() { window._showExisting(); });
        document.getElementById('btn-retake').addEventListener('click', function() {
          document.getElementById('opts-restart').querySelectorAll('.chat-opt-btn').forEach(function(b) { b.disabled = true; b.classList.add('disabled'); });
          addUserMessage('Пройти заново');
          showTyping();
          setTimeout(function() {
            removeTyping();
            addBotMessage('Отлично! Давайте начнём. Ответьте на 10 вопросов — это займёт несколько минут.');
            showTyping();
            setTimeout(function() { removeTyping(); renderQuestionChat(0); }, 600);
          }, 500);
        });
        window._showExisting = function() {
          answers = parsed.answers;
          var result = computeProfile(answers);
          var profile = PROFILES[result.profile];
          document.getElementById('chat-scroll').style.display = 'none';
          document.getElementById('chat-header').style.display = 'none';
          renderResult(result, profile);
        };
        scrollBottom();
        return;
      }
    } catch(e){}
  }

  // ── Auto-start ──
  (function autoStart() {
    addBotMessage('Добро пожаловать в тест адаптации NeuroAttention. Я помогу определить ваш профиль адаптации к изменениям.');
    showTyping();
    setTimeout(function() {
      removeTyping();
      addBotMessage('Тест состоит из 10 вопросов о вашем внимании, состоянии и привычках. Выбирайте вариант, который ближе всего к вашему опыту.');
      showTyping();
      setTimeout(function() { removeTyping(); renderQuestionChat(0); }, 700);
    }, 900);
  })();

})();
</script>
</body>
</html>
