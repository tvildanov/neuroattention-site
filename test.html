<script src="assets/scripts.js"></script>
<script src="assets/redesign.js"></script>
<script>
(function(){
  var initial = [
    { sender:'bot', text:'Добро пожаловать в диагностику NeuroAttention. Я помогу оценить текущее состояние вашего внимания.' },
    { sender:'bot', text:'Тест состоит из нескольких вопросов о вашем повседневном опыте с концентрацией, стрессом и когнитивными функциями.' },
    { sender:'bot', text:'Как часто вам сложно сосредоточиться на одной задаче более 15 минут?', options:['Почти всегда','Часто','Иногда','Редко'] }
  ];
  var followUps = [
    { text:'Замечаете ли вы, что часто переключаетесь между задачами, не завершив ни одну из них?', options:['Да, постоянно','Довольно часто','Иногда','Нет, редко'] },
    { text:'Как вы оцениваете свой уровень стресса в повседневной жизни?', options:['Очень высокий','Высокий','Умеренный','Низкий'] },
    { text:'Испытываете ли вы трудности с засыпанием из-за «бегающих мыслей»?', options:['Каждый день','Несколько раз в неделю','Иногда','Нет'] },
    { text:'Насколько легко вам удаётся осознавать сигналы своего тела (дыхание, напряжение, сердцебиение)?', options:['Очень сложно','Сложно','Средне','Легко'] },
    { text:'Спасибо за ответы! На основе ваших данных мы подготовим персональный отчёт о состоянии вашего внимания. Хотите узнать больше о методе NeuroAttention?', options:['Да, расскажите','Перейти к методу','Позже'] }
  ];
  var idx = 0;
  var container = document.getElementById('messages-inner');
  var scroller = document.getElementById('messages');
  var input = document.getElementById('chat-input');
  var sendBtn = document.getElementById('chat-send');

  function scrollBottom(){
    scroller.scrollTop = scroller.scrollHeight;
  }

  function makeBot(text, options){
    var wrap = document.createElement('div');
    wrap.className = 'chat-row bot';
    wrap.innerHTML = ''+
      '<div class="chat-avatar" style="width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;">'+
        '<video autoplay loop muted playsinline style="width:100%;height:100%;object-fit:cover;"><source src="assets/media/beam-1.mp4" type="video/mp4" /></video>'+
      '</div>'+
      '<div class="chat-stack">'+
        '<div class="chat-bubble-bot">'+escapeHtml(text)+'</div>'+
      '</div>';
    if (options && options.length) {
      var opts = document.createElement('div');
      opts.className = 'chat-options';
      options.forEach(function(o){
        var b = document.createElement('button');
        b.className = 'option-btn';
        b.textContent = o;
        b.addEventListener('click', function(){ handleSend(o); });
        opts.appendChild(b);
      });
      wrap.querySelector('.chat-stack').appendChild(opts);
    }
    container.appendChild(wrap);
    scrollBottom();
  }

  function makeUser(text){
    var wrap = document.createElement('div');
    wrap.className = 'chat-row user';
    wrap.innerHTML = '<div class="chat-bubble-user">'+escapeHtml(text)+'</div>';
    container.appendChild(wrap);
    scrollBottom();
  }

  function makeTyping(){
    var wrap = document.createElement('div');
    wrap.className = 'chat-row bot typing';
    wrap.id = 'typing-indicator';
    wrap.innerHTML = ''+
      '<div class="chat-avatar" style="width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;">'+
        '<video autoplay loop muted playsinline style="width:100%;height:100%;object-fit:cover;"><source src="assets/media/beam-1.mp4" type="video/mp4" /></video>'+
      '</div>'+
      '<div class="chat-bubble-bot"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
    container.appendChild(wrap);
    scrollBottom();
  }
  function removeTyping(){
    var t = document.getElementById('typing-indicator');
    if (t) t.parentNode.removeChild(t);
  }

  function disableLastOptions(){
    var rows = container.querySelectorAll('.chat-row.bot');
    if (!rows.length) return;
    var last = rows[rows.length-1];
    last.querySelectorAll('.option-btn').forEach(function(b){
      b.disabled = true;
      b.classList.add('disabled');
    });
  }

  function handleSend(text){
    if (!text || !text.trim()) return;
    disableLastOptions();
    makeUser(text.trim());
    input.value = '';
    makeTyping();
    setTimeout(function(){
      removeTyping();
      if (idx < followUps.length) {
        var q = followUps[idx];
        makeBot(q.text, q.options);
        idx++;
      } else {
        makeBot('Тест завершён. Перейдите к методу или программам, чтобы узнать больше.');
      }
    }, 1100);
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>\"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  // Render initial messages with slight delays for feel
  initial.forEach(function(m, i){
    setTimeout(function(){ makeBot(m.text, m.options); }, 300 + i*500);
  });

  sendBtn.addEventListener('click', function(){ handleSend(input.value); });
  input.addEventListener('keydown', function(e){ if (e.key === 'Enter') handleSend(input.value); });
})();
</script>
